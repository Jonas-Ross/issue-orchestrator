name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # bindings.ts is gitignored and generated from the Rust IPC surface;
      # regenerate it before lint / typecheck / test.
      - run: npm run bindings

      - run: npm run lint
      - run: npm run fmt:check
      - run: npx tsc --noEmit
      - run: npm test
